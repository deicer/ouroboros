services:
  ouroboros:
    build: .
    restart: "no"
    cpus: 1.0
    mem_limit: 2g
    env_file: .env
    environment:
      OUROBOROS_BOOTSTRAP_GIT_RESET: "0"
      OUROBOROS_SEND_PROGRESS_TO_OWNER: "0"
      OUROBOROS_SEND_PROACTIVE_MESSAGES_TO_OWNER: "0"
      OUROBOROS_SEND_LONG_TASK_HEARTBEATS: "0"
      OUROBOROS_SEND_SCHEDULED_TASK_NOTIFICATIONS: "0"
    depends_on:
      - qdrant
    ports:
      - "${OUROBOROS_TRACE_WEB_PORT:-8088}:${OUROBOROS_TRACE_WEB_PORT:-8088}"
    volumes:
      - ./data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: "no"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
